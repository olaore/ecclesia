# Column mapping is flexible: list multiple possible headers and the first present is used.
core_columns:
  first_name: ["first_name", "First Name", "Firstname", "Given Name"]
  last_name: ["last_name", "Last Name", "Lastname", "Surname", "Family Name"]
  full_name: ["full_name", "Full Name", "Name"]
  phone: ["phone", "Phone", "Phone Number", "Mobile", "Mobile Number"]
  # Prefer "Email Address" if both columns exist (your sheet has both).
  email: ["email", "Email Address", "Email"]
  gender: ["gender", "Gender", "Sex"]
  address: ["address", "Address", "Home Address", "Residential Address"]
  dob: ["dob", "DOB", "Date of Birth", "Birth Date", "Birthday (Month/Day)", "Birthday"]
  timestamp: ["timestamp", "Timestamp"]
  marital_status: ["marital_status", "Marital Status"]
  occupation: ["occupation", "Occupation"]
  department: ["department", "Department you belong to", "Department"]
  comments: ["comments", "Comments"]

defaults:
  phone_region: "NG"  # Nigeria (+234)
  # Google Form field says Month/Day, so interpret numeric dates like 1/2 as Jan 2.
  dob_month_day_month_first: true

dedup:
  # Exact-key union (phone/email/name+dob) always runs.
  # Fuzzy union is conservative and only runs within blocks.
  core_fuzzy_threshold: 95
  max_block_size: 200

birthdays:
  # Auto-link threshold for birthday -> member matching.
  auto_link_threshold: 92
  review_threshold: 80
  top_candidates: 5
